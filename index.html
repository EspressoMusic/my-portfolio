<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Shilo Hadad ? Full-Stack Developer & Product Builder" />
  <title>Shilo Hadad ? Developer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="bg-mesh" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>
  <div class="scroll-progress" aria-hidden="true"><span class="scroll-progress-bar"></span></div>

  <header class="header" id="header">
    <a href="#home" class="logo" data-bind="brand">Shilo Hadad</a>
    <nav class="nav" aria-label="Main">
      <button class="nav-toggle" aria-expanded="false" aria-controls="nav-menu" aria-label="Menu">
        <span></span><span></span>
      </button>
      <ul class="nav-list" id="nav-menu">
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#work">Work</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
    <a href="#" class="btn btn-cv" data-bind-href="cvFile" download>Resume</a>
  </header>

  <main>
    <section class="hero" id="home">
      <div class="hero-inner container">
        <div class="hero-copy">
          <p class="pill" data-scroll="fade-up" data-bind="roleSubtitle">Product Builder</p>
          <h1 class="hero-name" data-scroll="fade-up" data-scroll-delay="1">
            <span class="hero-first" data-bind="firstName">Shilo</span>
            <span class="hero-last gradient-text" data-bind="lastName">Hadad</span>
          </h1>
          <p class="hero-role" data-scroll="fade-up" data-scroll-delay="2" data-bind="roleLine">Full-Stack Developer</p>
          <p class="hero-bio" data-scroll="fade-up" data-scroll-delay="3" data-bind="heroBio"></p>
          <div class="hero-actions" data-scroll="fade-up" data-scroll-delay="4">
            <a href="#work" class="btn btn-primary">View work</a>
            <a href="#contact" class="btn btn-ghost">Contact</a>
          </div>
          <p class="hero-location" data-scroll="fade" data-scroll-delay="5" data-bind="location"></p>
        </div>

        <div class="hero-visual" data-scroll="fade-left" data-scroll-delay="2">
          <div class="photo-glow" aria-hidden="true"></div>
          <div class="photo-ring" aria-hidden="true"></div>
          <figure class="photo-frame">
            <img
              class="photo-color"
              data-bind-src="images.hero"
              src="assets/images/shilo.png"
              alt="Shilo Hadad"
              width="480"
              height="600"
            />
          </figure>
        </div>
      </div>
    </section>

    <section class="about" id="about">
      <div class="container">
        <div class="about-top" data-scroll="fade-up">
          <span class="section-num">01</span>
          <h2 class="section-title">About</h2>
        </div>
        <div class="about-body">
          <p class="about-lead" data-scroll="fade-up" data-bind="aboutText"></p>
          <ul class="stats-row" id="stats-list"></ul>
        </div>
      </div>
    </section>

    <section class="work" id="work">
      <div class="container">
        <div class="about-top" data-scroll="fade-up">
          <span class="section-num">02</span>
          <h2 class="section-title">Selected work</h2>
        </div>
        <div class="bento" id="projects-bento"></div>
      </div>
    </section>

    <section class="skills" id="skills">
      <div class="container">
        <div class="about-top" data-scroll="fade-up">
          <span class="section-num">03</span>
          <h2 class="section-title">Skills & services</h2>
        </div>
        <div class="skills-layout">
          <div class="skills-grid" id="skills-grid"></div>
          <div class="services-stack" id="services-grid"></div>
        </div>
      </div>
    </section>

    <section class="contact" id="contact">
      <div class="container contact-wrap">
        <div class="contact-card" data-scroll="scale">
          <span class="section-num">04</span>
          <h2 class="contact-heading">Let's build something.</h2>
          <p class="contact-note" data-bind="location"></p>
          <div class="contact-links" id="contact-links"></div>
          <div class="social-links" id="social-links"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <span data-bind="name">Shilo Hadad</span>
      <span>&copy; <span id="year"></span></span>
    </div>
  </footer>

  <script src="content.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
